name: BFF — Typecheck

on:
  push:
    branches: [main]
    paths:
      - 'bff/**'
  pull_request:
    paths:
      - 'bff/**'

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bff/package-lock.json

      - name: Install
        working-directory: bff
        run: npm ci

      - name: Typecheck
        working-directory: bff
        run: npx tsc --noEmit

      - name: Lint
        working-directory: bff
        run: npm run lint